schema_version: 1
id: beellama-local
display_name: beellama.cpp v0.3.2-preview local CUDA server (DFlash + windowed KV + KVarN)
type: llama.cpp
stability: experimental
install:
  method: docker_image
  # Single source of truth for the beellama image — switch.sh/launch.sh inject this as
  # BEELLAMA_IMAGE across all beellama composes (the per-compose ${BEELLAMA_IMAGE:-…} literal
  # is only a fallback for direct `docker compose`). Bump this ONE line to update (beellama-pin-bump).
  #
  # PINNED BY DIGEST (not tag): the commit-suffixed preview tag `server-cuda-preview-v0.3.2-317c65e27e1e`
  # PREDATES the KVarN merge (its `--cache-type-k` rejects kvarn*; only turbo/TCQ). KVarN lives only in
  # the LATEST rolling `server-cuda-preview-v0.3.2` build (commit 98caf25), which Anbeeld publishes with
  # NO immutable commit-suffixed tag — so we pin the DIGEST of that build (immutable + has KVarN), the
  # same pattern as the vLLM `:gemma` digest pin. Re-resolve the digest when the rolling tag advances.
  spec: ghcr.io/anbeeld/beellama.cpp@sha256:858e7cfbfb0d5d3d605723a82ace1474698de368b81bc310f4df4dadc6c1b7d2
min_sm: 6.0
supported_model_families:
  - qwen3-next-hybrid
  - qwen3-next-moe
  - gemma4-swa-dense
  - gemma4-unified
features: {}
supported_kv_formats:
  - q4_0
  - q4_1
  - q5_0
  - q8_0
  - kvarn4   # KVarN KV-compression (v0.3.2 preview) — q5-class quality at ~28% bf16; quality- + decode-neutral on sm_86 (disc #329)
supported_drafters:
  - dflash
  - mtp
  - mtp_gguf   # GGUF embedded MTP head via `--spec-type draft-mtp` (unsloth-mtp-gguf drafter; beellama/qwen-mtp-dual)
supported_weight_formats:
  - gguf
required_overlays: []
vendored_overlays: []
required_genesis: false
notes: "Anbeeld's llama.cpp fork (https://github.com/Anbeeld/beellama.cpp) — adds DFlash cross-attention speculative decoding (`--spec-type dflash` + a DFlash draft GGUF) and TurboQuant/TCQ KV cache types on top of mainline-lineage windowed KV (SWA-aware allocation for Gemma-4). Single-card answer for Gemma-4 long-context + spec-dec (only engine with both; ik-llama walls ~24K, mainline ~10 TPS) and a tool-grammar-neutral spec-dec path for Qwen3.6 (DFlash does not amplify the CodeAct attractor the built-in MTP head does, club-3090#237). Anbeeld now publishes OFFICIAL multi-arch CI images on his GHCR (server-cuda-* / server-cuda12-* / cpu / rocm / sycl / vulkan). install.spec pins the v0.3.2 PREVIEW build BY DIGEST (sha256:858e7c… = the rolling server-cuda-preview-v0.3.2 / commit 98caf25 that has KVarN; the commit-suffixed -317c65 tag predates KVarN and only exposes turbo/TCQ). v0.3.2 adds experimental KVarN KV-compression on top of DFlash/TCQ. Measured on sm_86 (Qwen3.6-27B Q5_K_S, 2026-06-12): KVarN lifts the single-card single-request ceiling from ~196K (q5_0/q4_1, 262K OOMs) to the full 262K — kvarn4 (≈q5_0 quality per #329) fits 262K tight (~1GB free), kvarn2 fits with ~3GB free; recall-at-depth NIAH still pending. switch.sh/launch.sh inject it as BEELLAMA_IMAGE. The per-compose ${BEELLAMA_IMAGE:-…} literal (our self-hosted multiarch-v0.3.0-efe856397, multi-arch incl sm_120) is the direct-`docker compose` fallback. FA_ALL_QUANTS=ON is required for the q5_0/q4_1 turbo KV types — Anbeeld's CI image has it; if self-building, build `.devops/cuda.Dockerfile` with CUDA_DOCKER_ARCH=86 + -DGGML_CUDA_FA_ALL_QUANTS=ON. Composes stay 🧪 Experimental: v0.3.2 is a ROLLING PRE-RELEASE (Anbeeld replaces its moving Docker tags with newer branch builds — we pin the COMMIT-suffixed tag so OUR pin is immutable), not a stable release; the model-default resolver skips experimental. The first STABLE tag is v0.3.1 (server-cuda-v0.3.1, non-prerelease, brings Qwen3 MTP post-norm + CUDA KV-quant fixes) — repoint install.spec there to UN-PARK the composes (#455) once it passes the full gate (one-line bump; see beellama-pin-bump)."
