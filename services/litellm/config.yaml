model_list:
  # === Current serving primaries (one GPU service runs at a time per gpu-mode;
  #     routes to the inactive backends fail until that mode is brought up) ===

  # Qwen 3.6 27B (Lorbus AutoRound INT4) + MTP n=3 + fp8 KV + 262K + vision.
  # Started by `gpu-mode 27b` → vllm-qwen36-27b-dual at :8010. Stack default.
  - model_name: qwen3.6-27b-autoround
    litellm_params:
      model: openai/qwen3.6-27b-autoround
      api_base: http://host.docker.internal:8010/v1
      api_key: EMPTY

  # Qwen 3.6 35B-A3B (Intel AutoRound INT4 MoE) — 262K + vision, no MTP.
  # Launched via `launch.sh vllm/qwen-35b-a3b-dual` → vllm-qwen36-35b-a3b-dual at :8051.
  - model_name: qwen3.6-35b-a3b-autoround
    litellm_params:
      model: openai/qwen3.6-35b-a3b-autoround
      api_base: http://host.docker.internal:8051/v1
      api_key: EMPTY

  # Gemma 4 31B (Intel AutoRound INT4) + INT8-PTH KV @262K.
  # Started by `gpu-mode gemma` → vllm-gemma-4-31b-mtp-int8 at :8032 (the old gemma-mtp
  # :8030 scene was pruned; the live scene is mode_gemma_int8 on :8032).
  - model_name: gemma-4-31b-autoround
    litellm_params:
      model: openai/gemma-4-31b-autoround
      api_base: http://host.docker.internal:8032/v1
      api_key: EMPTY

  # (The old gemma-4-12b :8069 llama.cpp "chat brain" route was retired 2026-06-23 with the
  #  ai-studio consolidation — the studio uses the qwen director only.)

  # Gemma 4 12B (gemma4_unified arch, Intel AutoRound INT8) + bf16 KV + MTP n=2, single card.
  # Started by `gpu-mode gemma12b` → vllm-gemma-4-12b-int8-mtp at :8038 (served gemma-4-12b-int8).
  # Single-card scene: GPU-mutex with the dual models and ai-studio.
  - model_name: gemma-4-12b-int8
    litellm_params:
      model: openai/gemma-4-12b-int8
      api_base: http://host.docker.internal:8038/v1
      api_key: EMPTY

  # NOTE: Gemma 4 26B-A4B is intentionally NOT routed — the registry default
  # (vllm/gemma-a4b, :8041) is the autoround-int4-mixed compose, which is
  # SM86-blocked (Marlin K-dim 704/128). The working AWQ variant
  # (vllm/gemma-a4b-awq, :8042) is not a gpu-mode primary; add a route here if
  # it gets promoted.

  # Qwen3.6-40B-Deckard (dense 40B uncensored, llama.cpp dual 3090, MTP n=2).
  # Launched via `launch.sh llamacpp/deckard40B-dual-mtp` → llama-cpp-deckard-40b at :8199.
  # Both-cards mode (GPU-mutex with ai-studio and all single-card services).
  - model_name: deckard-40b
    litellm_params:
      model: openai/deckard-40b
      api_base: http://host.docker.internal:8199/v1
      api_key: EMPTY
