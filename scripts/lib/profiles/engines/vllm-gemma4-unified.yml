notes: "Gemma-4-12B (gemma4_unified arch) vLLM path. Pins the EPHEMERAL `vllm/vllm-openai:gemma4-unified` arch-preview tag — gemma4_unified was merged into vLLM main in PR #44429 (2026-06-03); this tag IS today's vLLM main, so the Gemma-4 arch fixes are baked in and NOTHING is vendored (no #40391/#42006 mounts). The tag may move/disappear — pin a digest before any Production promotion. Only bf16/fp16 KV on this image (no fp8/INT8-PTH path here). Usable context ceiling is 131072: the card claims 256K via p-RoPE but vLLM OOB-crashes on prefill past the trained max (vllm#39914)."
