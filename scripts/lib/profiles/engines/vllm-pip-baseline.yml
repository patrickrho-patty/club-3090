schema_version: 1
id: vllm-pip-baseline
display_name: vLLM pip baseline (dense lower-bound)
type: vllm
stability: stable
install:
  method: pip
  spec: vllm==0.20.2
min_sm: 7.5
supported_model_families:
  - dense
features:
  int8_per_token_head: false
  turboquant_3bit_nc: false
  marlin_pad_sub_tile_n: false
  qwen3_coder_tool_parser: stable_only
supported_kv_formats:
  - bf16
  - fp16
  - fp8_e5m2
  - fp8_e4m3
supported_drafters:
  - eagle3
supported_weight_formats:
  - bf16
  - fp16
  - autoround
  - awq
  - gptq
required_overlays: []
vendored_overlays: []
required_genesis: false
notes: "Generic dense lower-bound pin (pip vllm==0.20.2), the conservative arch_patches.yml floor for common-transformers families (Llama/Mistral/Qwen2/Phi/Gemma1-3/Cohere/Mixtral/...). Renamed from `vllm-stable` 2026-06-05 (#254) to free the `vllm-stable` name for the docker stable engine. Distinct delivery mechanism (pip-install, not a docker image) — not used by any shipped compose; it's the engine-support floor for the v0.8.2 arch-expansion rows."
